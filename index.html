<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>OTR Finder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF9;
  --surface:#FFFFFF;
  --sidebar:#F5F4F2;
  --sidebar-border:#EBEBEA;

  --g50:#F7F6F4;
  --g100:#EFEDE9;
  --g150:#E5E2DC;
  --g200:#D8D4CC;
  --g300:#BCB8AE;
  --g400:#9E9A91;
  --g500:#7A766E;
  --g600:#5C5850;
  --g700:#3E3C36;
  --g800:#28261F;
  --g900:#1A1812;

  --accent:#1A1812;
  --accent2:#3D6B57;   /* 물류 그린 포인트 */
  --accent2-light:#EBF4EF;
  --accent2-mid:#6A9E86;

  --blue:#2D5FA8;
  --blue-light:#EEF3FB;

  --sh0:0 1px 3px rgba(26,24,18,.06);
  --sh1:0 4px 16px rgba(26,24,18,.08);
  --sh2:0 12px 40px rgba(26,24,18,.12);
  --sh3:0 24px 64px rgba(26,24,18,.16);

  --radius-sm:8px;
  --radius:12px;
  --radius-lg:18px;
  --radius-xl:24px;
}
html,body{height:100%;-webkit-font-smoothing:antialiased;overflow:hidden}
body{background:var(--bg);color:var(--g800);font-family:'DM Sans',sans-serif;font-size:15px;display:flex}
button{cursor:pointer;font-family:inherit;border:none;background:none}
textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--g200);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ── SIDEBAR ── */
.sidebar{width:256px;min-width:256px;height:100vh;background:var(--sidebar);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;padding:20px 14px;flex-shrink:0;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-logo{font-size:15px;font-weight:700;color:var(--g900);padding:4px 8px 22px;letter-spacing:-.4px;display:flex;align-items:center;gap:9px}
.sidebar-logo-mark{width:28px;height:28px;border-radius:8px;background:var(--g900);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sidebar-new{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--g600);transition:all .15s;width:100%;text-align:left;border:1px solid transparent}
.sidebar-new:hover{background:var(--surface);border-color:var(--g150);color:var(--g800);box-shadow:var(--sh0)}
.sidebar-new svg{width:13px;height:13px;stroke:var(--g400);fill:none;stroke-width:2;stroke-linecap:round}
.sidebar-section{font-size:10px;font-weight:600;color:var(--g300);letter-spacing:.08em;text-transform:uppercase;padding:20px 8px 7px}
.sidebar-item{padding:8px 12px;border-radius:var(--radius-sm);font-size:12.5px;color:var(--g500);cursor:pointer;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:left;display:flex;align-items:center;gap:7px}
.sidebar-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--g300);flex-shrink:0}
.sidebar-item:hover{background:var(--surface);color:var(--g800);box-shadow:var(--sh0)}
.sidebar-item.active{background:var(--surface);color:var(--g900);font-weight:500;box-shadow:var(--sh0)}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--sidebar-border)}
.sidebar-footer-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;color:var(--g500);transition:all .12s;width:100%;text-align:left}
.sidebar-footer-item:hover{background:var(--surface);color:var(--g700)}
.sidebar-footer-item svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.user-dot{width:22px;height:22px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--g600);flex-shrink:0}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;background:var(--bg)}

/* ── TOP BAR (모바일용) ── */
.topbar{display:none;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--g100);flex-shrink:0;background:var(--surface)}
.topbar-logo{font-size:14px;font-weight:700;color:var(--g900);display:flex;align-items:center;gap:8px}
.topbar-logo-mark{width:24px;height:24px;border-radius:6px;background:var(--g900);display:flex;align-items:center;justify-content:center;font-size:12px}
.topbar-menu{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--g100);display:flex;align-items:center;justify-content:center;transition:background .12s}
.topbar-menu:hover{background:var(--g150)}
.topbar-menu svg{width:14px;height:14px;stroke:var(--g600);fill:none;stroke-width:2;stroke-linecap:round}

/* ── CHAT AREA ── */
.chat{flex:1;overflow-y:auto;padding:0 0 8px}
.chat-inner{max-width:740px;margin:0 auto;padding:28px 28px 8px}

/* ── WELCOME ── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:72vh;text-align:center;padding:40px 24px;animation:wFade .5s ease}
@keyframes wFade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.welcome-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent2-light);color:var(--accent2);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:20px;letter-spacing:.02em}
.welcome-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.welcome-icon{font-size:42px;margin-bottom:18px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1))}
.welcome-title{font-size:30px;font-weight:700;color:var(--g900);letter-spacing:-.8px;margin-bottom:10px;line-height:1.15}
.welcome-sub{font-size:14px;color:var(--g400);margin-bottom:40px;line-height:1.7;max-width:400px}
.welcome-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:580px}
.pill{padding:9px 18px;border-radius:20px;border:1.5px solid var(--g150);background:var(--surface);font-size:12.5px;color:var(--g600);cursor:pointer;transition:all .18s;font-weight:500;box-shadow:var(--sh0)}
.pill:hover{border-color:var(--g800);background:var(--g900);color:#fff;transform:translateY(-1px);box-shadow:var(--sh1)}

/* ── MESSAGES ── */
.mg{padding:5px 0;animation:msgIn .22s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg.user .bub{background:var(--g900);color:#fff;border-radius:var(--radius-lg) 5px var(--radius-lg) var(--radius-lg);max-width:78%;font-size:13.5px;line-height:1.6}
.msg.ai .bub{background:var(--surface);color:var(--g800);border-radius:5px var(--radius-lg) var(--radius-lg) var(--radius-lg);max-width:84%;border:1px solid var(--g100);box-shadow:var(--sh0)}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;background:var(--g900);display:flex;align-items:center;justify-content:center}
.av svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round}
.bub{padding:12px 16px;font-size:13.5px;line-height:1.68;white-space:pre-wrap}
.thk-dots{display:inline-flex;gap:5px;align-items:center;padding:14px 16px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--g300);animation:bo .9s infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes bo{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-5px);opacity:1}}

/* ── OPTIONS ── */
.opts{padding:6px 0 6px 38px;display:flex;flex-direction:column;gap:5px;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.opt{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:var(--radius);border:1.5px solid var(--g150);background:var(--surface);font-size:13px;color:var(--g700);text-align:left;transition:all .16s;box-shadow:var(--sh0)}
.opt:hover{border-color:var(--g800);background:var(--g50);transform:translateX(2px)}
.opt:disabled{opacity:.3;cursor:not-allowed;transform:none}
.onum{min-width:22px;height:22px;border-radius:6px;background:var(--g100);color:var(--g500);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace}
.olbl{font-weight:600;font-size:13px;color:var(--g800)}
.osub{font-size:11px;color:var(--g400);margin-top:1px}

/* ── RESULTS ── */
.res{padding:6px 0 6px 38px;animation:fu .25s ease}
.res-hdr{font-size:10px;font-weight:600;color:var(--g400);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.res-hdr::after{content:'';flex:1;height:1px;background:var(--g100)}
.aib{background:var(--surface);border:1.5px solid var(--g150);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;font-size:13px;line-height:1.8;color:var(--g700);white-space:pre-wrap;box-shadow:var(--sh0)}
.cards{display:flex;flex-direction:column;gap:8px}

/* ── CARRIER CARDS ── */
.cc{background:var(--surface);border:1.5px solid var(--g150);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:var(--sh0)}
.cc:hover{border-color:var(--g300);box-shadow:var(--sh1);transform:translateY(-1px)}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.cc-rnk{width:22px;height:22px;border-radius:6px;background:var(--g100);color:var(--g500);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace}
.cc-rnk.r1{background:var(--g900);color:#fff}.cc-rnk.r2{background:var(--g700);color:#fff}.cc-rnk.r3{background:var(--g400);color:#fff}
.cc-nw{flex:1;min-width:0}
.cc-name{font-size:13.5px;font-weight:700;color:var(--g900);letter-spacing:-.2px}
.cc-hq{font-size:10.5px;color:var(--g400);margin-top:2px}
.cc-sv{width:26px;height:26px;border-radius:7px;background:var(--g100);color:var(--g400);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cc-sv:hover{background:var(--g200)}
.cc-sv.on{background:var(--accent2-light);color:var(--accent2);border:1.5px solid var(--accent2-mid)}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.sg{background:var(--g50);border-radius:8px;padding:6px 7px;text-align:center;border:1px solid var(--g100)}
.sgl{font-size:8px;color:var(--g400);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.sgv{font-size:11px;font-weight:700;color:var(--g700);font-family:'DM Mono',monospace}
.cbdg{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.bdg{font-size:9px;padding:2px 7px;border-radius:5px;background:var(--g100);color:var(--g500);font-weight:600;font-family:'DM Mono',monospace}
.db-badge{font-size:9px;padding:2px 7px;border-radius:5px;background:var(--blue-light);color:var(--blue);font-weight:600}
.cact{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--g100)}
.cbtn{flex:1;padding:8px;border-radius:var(--radius-sm);font-size:11.5px;font-weight:600;transition:all .15s}
.cbtn.p{background:var(--g900);color:#fff}.cbtn.p:hover{background:var(--g700);transform:translateY(-1px)}
.cbtn.s{background:var(--g100);color:var(--g700);border:1px solid var(--g150)}.cbtn.s:hover{background:var(--g150)}
.lvis{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--g150);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;box-shadow:var(--sh0)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lline{flex:1;height:1px;background:linear-gradient(90deg,var(--g300),var(--g200));position:relative}
.larrow{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--accent2);font-weight:700}
.ltype{font-size:10px;color:var(--g400);margin-left:auto;font-weight:500;background:var(--g50);padding:2px 8px;border-radius:20px;border:1px solid var(--g150)}

/* ── RATE BOX ── */
.ratebox{background:var(--surface);border:1.5px solid var(--g150);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;box-shadow:var(--sh0)}
.ratebox-hdr{font-size:10px;font-weight:600;color:var(--g400);letter-spacing:.07em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ratebox-hdr::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent2);border-radius:2px}
.rate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.rg{background:var(--g50);border:1px solid var(--g100);border-radius:var(--radius);padding:12px 10px;text-align:center}
.rg-l{font-size:9px;color:var(--g400);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.rg-v{font-size:18px;font-weight:700;color:var(--g900);letter-spacing:-.5px;font-family:'DM Mono',monospace}
.rg-s{font-size:10px;color:var(--g400);margin-top:2px}
.rr-lbl{font-size:11px;font-weight:600;color:var(--g600);margin-bottom:8px}
.rr-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rr-tag{font-size:10px;color:var(--g400);width:36px;flex-shrink:0;font-weight:600;font-family:'DM Mono',monospace}
.rr-bar{flex:1;height:5px;background:var(--g100);border-radius:5px;overflow:hidden}
.rr-fill{height:100%;background:var(--g300);border-radius:5px;transition:width .4s ease}
.rr-fill.mid{background:var(--accent2-mid)}
.rr-val{font-size:12px;font-weight:700;color:var(--g800);width:58px;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace}
.mkt-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mkt-lbl{font-size:11px;color:var(--g500)}
.mkt-badge{font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;background:var(--accent2-light);color:var(--accent2)}
.mkt-fsc{font-size:11px;color:var(--g400);margin-left:auto}
.rate-tips{font-size:12px;color:var(--g600);line-height:1.75}
.rate-note{font-size:10px;color:var(--g300);margin-top:10px;padding-top:9px;border-top:1px solid var(--g100)}

/* ── PROGRESS ── */
.prog{padding:5px 0 5px 38px;display:flex;align-items:center;gap:10px}
.pbar{flex:1;height:2px;background:var(--g100);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent2-mid),var(--g900));border-radius:2px;transition:width .5s ease}
.ptxt{font-size:10px;color:var(--g400);font-weight:500;white-space:nowrap}

/* ── STATUS BADGES ── */
.s-ok{background:var(--accent2-light);color:var(--accent2);font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700}
.s-bk{background:var(--g100);color:var(--g500);font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600}
.star{font-size:11px;color:var(--g200)}.star.on{color:#E4A62A}
.sn{font-size:10px;color:var(--g400)}
.rt{font-size:10px;color:var(--g400);margin-left:auto;font-family:'DM Mono',monospace}
.cc-row{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.ctags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.tg{font-size:9px;padding:2px 8px;border-radius:20px;background:var(--g50);color:var(--g600);font-weight:500;border:1px solid var(--g150)}
.cmc{font-size:8px;color:var(--g300);margin-left:auto;font-family:'DM Mono',monospace}

/* ── INPUT AREA ── */
.inp-area{padding:14px 28px 24px;flex-shrink:0;max-width:740px;margin:0 auto;width:100%}
.inp-wrap{position:relative}
.acdrop{position:absolute;bottom:calc(100% + 8px);left:0;right:0;z-index:100;background:var(--surface);border:1.5px solid var(--g150);border-radius:var(--radius-lg);box-shadow:var(--sh2);overflow:hidden;display:none}
.aci{padding:11px 16px;font-size:13px;color:var(--g700);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.aci:hover,.aci.hl{background:var(--g50)}
.aci mark{background:transparent;color:var(--g900);font-weight:700;padding:0}
.hub-c{font-size:9px;background:var(--g100);color:var(--g500);padding:2px 6px;border-radius:4px;margin-left:auto;font-weight:600}
.ibox{display:flex;align-items:flex-end;gap:10px;background:var(--surface);border:1.5px solid var(--g200);border-radius:var(--radius-xl);padding:12px 12px 12px 20px;transition:all .22s;box-shadow:var(--sh0)}
.ibox:focus-within{border-color:var(--g600);box-shadow:0 0 0 3px rgba(26,24,18,.07),var(--sh1)}
.ibox textarea{flex:1;background:transparent;border:none;outline:none;color:var(--g900);font-size:14px;resize:none;line-height:1.5;padding:2px 0;min-height:24px;max-height:120px}
.ibox textarea::placeholder{color:var(--g300)}
.sbtn{width:36px;height:36px;border-radius:var(--radius);flex-shrink:0;background:var(--g900);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .16s}
.sbtn:hover{background:var(--g700);transform:scale(1.05)}
.sbtn:disabled{background:var(--g200);cursor:not-allowed;transform:none}
.inp-hint{text-align:center;font-size:11px;color:var(--g300);margin-top:9px;letter-spacing:.01em}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(26,24,18,.25);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;width:100%;max-width:740px;max-height:88vh;overflow-y:auto;padding:16px 22px 36px;animation:su .28s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--g150)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;border-radius:4px;background:var(--g200);margin:0 auto 18px}
.mt{font-size:18px;font-weight:700;color:var(--g900);margin-bottom:4px;letter-spacing:-.3px}
.ms{font-size:12px;color:var(--g400);margin-bottom:16px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.mi{background:var(--g50);border-radius:var(--radius-sm);padding:11px 13px;border:1px solid var(--g100)}
.mik{font-size:9px;color:var(--g400);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.miv{font-size:12.5px;color:var(--g800);font-weight:600;font-family:'DM Mono',monospace}
.macts{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:12px;border-radius:var(--radius);font-size:13px;font-weight:600;transition:all .16s;text-align:center;display:flex;align-items:center;justify-content:center}
.mbtn.p{background:var(--g900);color:#fff}.mbtn.p:hover{background:var(--g700)}
.mbtn.s{background:var(--g100);color:var(--g700);border:1.5px solid var(--g150)}.mbtn.s:hover{background:var(--g150)}
.rfqpre{background:var(--g50);border:1.5px solid var(--g150);border-radius:var(--radius);padding:14px;font-size:11.5px;color:var(--g700);white-space:pre-wrap;max-height:300px;overflow-y:auto;line-height:1.75;font-family:'DM Mono',monospace}
.cpybtn{width:100%;margin-top:10px;padding:12px;border-radius:var(--radius);font-size:13px;font-weight:600;background:var(--g900);color:#fff;transition:all .16s}
.cpybtn:hover{background:var(--g700)}.cpybtn.ok{background:var(--accent2)}

/* ── MOBILE ── */
@media(max-width:700px){
  .sidebar{position:fixed;top:0;left:0;z-index:300;transform:translateX(-100%);box-shadow:var(--sh3)}
  .sidebar.open{transform:translateX(0)}
  .topbar{display:flex}
  .inp-area{padding:10px 16px 22px}
  .chat-inner{padding:16px 16px}

// ─── AI 레인 파싱 ────────────────────────────────────────────────
async function parseLaneWithAI(text){
  try{
    const res=await fetch(`${WORKER}/parse`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(!res.ok)throw new Error('Worker error');
    const data=await res.json();
    return{origin:data.origin||'',dest:data.dest||''};
  }catch(e){return parseLaneTextFallback(text);}
}

function parseLaneTextFallback(text){
  let t=text.trim();
  const patterns=[/(.+?)에서\s*(.+?)(?:까지|로|으로|가는)?(?:\s|$)/,/(.+?)\s*→\s*(.+)/,/(.+?)\s+to\s+(.+)/i,/(.+?)\s*[-–]\s*(.+)/];
  for(const pat of patterns){
    const m=t.match(pat);
    if(m){
      const a=m[1].trim();const b=m[2].trim().replace(/까지$|로$|으로$|가는$/,'').trim();
      const origin=resolveCity(a);const dest=resolveCity(b);
      if(origin&&dest)return{origin,dest};
    }
  }
  const found=[];
  const sorted=Object.entries(CITY_ALIAS).sort((a,b)=>b[0].length-a[0].length);
  let rem=t;
  for(const [alias,city] of sorted){
    const idx=rem.toLowerCase().indexOf(alias.toLowerCase());
    if(idx>=0&&!found.find(f=>f.city===city)){
      found.push({city,idx:t.toLowerCase().indexOf(alias.toLowerCase())});
      rem=rem.slice(0,idx)+' '.repeat(alias.length)+rem.slice(idx+alias.length);
    }
    if(found.length>=2)break;
  }
  found.sort((a,b)=>a.idx-b.idx);
  if(found.length>=2)return{origin:found[0].city,dest:found[1].city};
  if(found.length===1)return{origin:found[0].city,dest:''};
  return{origin:'',dest:''};
}

function resolveCity(raw){
  if(!raw)return'';
  const t=raw.trim();
  const upper=t.toUpperCase();
  for(const [alias,city] of Object.entries(CITY_ALIAS)){if(alias.toUpperCase()===upper)return city;}
  const sorted=Object.entries(CITY_ALIAS).sort((a,b)=>b[0].length-a[0].length);
  for(const [alias,city] of sorted){if(t.toLowerCase().includes(alias.toLowerCase()))return city;}
  const lower=t.toLowerCase();
  for(const city of CITIES_EN){const name=city.split(',')[0].toLowerCase();if(lower.includes(name))return city;}
  return'';
}

  scr();
}

// ─── MC 조회 ────────────────────────────────────────────────────
async function doMC(q){
  const local=C.find(c=>c.mc.toLowerCase().includes(q.toLowerCase())||c.dot.toLowerCase().includes(q.toLowerCase())||c.n.toLowerCase().includes(q.toLowerCase()));
  if(local){const w=document.createElement('div');w.className='res';w.innerHTML=`<div class="res-hdr">검색 결과</div><div class="cards">${cHTML(local,1)}</div>`;ch.appendChild(w);scr();ST.pending='__chat__';return;}
  addThink();
  const clean=q.replace(/mc-?/i,'').trim();
  let apiUrl='';
  if(q.match(/^mc-?\d+$/i))apiUrl=`${WORKER}/mc/${clean}`;
  else if(q.match(/^\d{6,}$/))apiUrl=`${WORKER}/dot/${clean}`;
  else apiUrl=`${WORKER}/name/${encodeURIComponent(q)}`;
  try{
    const res=await fetch(apiUrl);const data=await res.json();rmThink();
    const carriers=(data.content||[]).map(item=>item.carrier||item).filter(Boolean);
    if(!carriers.length){addAI(`"${q}" — 검색 결과가 없습니다.\n공식 조회: safer.fmcsa.dot.gov`);ST.pending='__chat__';return;}
    const w=document.createElement('div');w.className='res';
    w.innerHTML=`<div class="res-hdr">FMCSA 결과 ${carriers.length}개</div><div class="cards">${carriers.slice(0,5).map((c,i)=>{
      const name=c.legalName||c.dbaName||'Unknown';const auth=c.allowedToOperate==='Y'?'Active':'Inactive';const city=`${c.phyCity||''}, ${c.phyState||''}`.trim().replace(/^,\s*/,'');
      return`<div class="cc"><div class="cc-top"><div class="cc-rnk ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div><div class="cc-nw"><div class="cc-name">${name}</div><div class="cc-hq">${city}</div></div><span class="${auth==='Active'?'s-ok':'s-bk'}">${auth}</span></div><div class="sgrid" style="margin-top:8px"><div class="sg"><div class="sgl">Trucks</div><div class="sgv">${c.totalPowerUnits||'—'}</div></div><div class="sg"><div class="sgl">Drivers</div><div class="sgv">${c.totalDrivers||'—'}</div></div><div class="sg"><div class="sgl">Safety</div><div class="sgv">${c.safetyRating||'—'}</div></div><div class="sg"><div class="sgl">Hazmat</div><div class="sgv">${c.hazmatFlag==='Y'?'✓':'—'}</div></div></div><div class="cbdg" style="margin-top:6px"><span class="bdg">DOT# ${c.dotNumber||'—'}</span><span class="bdg">MC# ${c.mcNumber||'—'}</span></div></div>`;
    }).join('')}</div>`;
    ch.appendChild(w);scr();
  }catch(e){rmThink();addAI('조회 중 오류가 발생했습니다.');}
  ST.pending='__chat__';
}

// ─── 운임 표시 ───────────────────────────────────────────────────

  const r=calcRate(origin,dest,eq||'Dry Van');
  const maxR=r.high;

  rw.innerHTML=`<div class="lvis"><div class="ldot" style="background:var(--g800)"></div><span style="font-size:12px;font-weight:600;color:var(--g800)">${origin||'?'}</span><div class="lline"><div class="larrow">→</div></div><span style="font-size:12px;font-weight:600;color:var(--g800)">${dest||'?'}</span><div class="ldot" style="background:var(--g400)"></div><span class="ltype">${eq||'Dry Van'}</span></div>

  ch.appendChild(rw);scr();
}

// ─── CARRIER CARD ────────────────────────────────────────────────
function cHTML(c,rank){
  const sv=isS(c);const st=[1,2,3,4,5].map(i=>`<span class="star${i<=Math.round(c.rat)?' on':''}">★</span>`).join('');const rk=rank<=3?`r${rank}`:'';

function refreshSvBtns(){document.querySelectorAll('.cc').forEach(card=>{const m=card.getAttribute('onclick')||'';const mm=m.match(/openC\((\d+)\)/);if(mm){const c=C.find(x=>x.id===parseInt(mm[1]));if(c){const b=card.querySelector('.cc-sv');if(b)b.className='cc-sv'+(isS(c)?' on':'')}}});}

// ─── SUPABASE 캐리어 카드 ─────────────────────────────────────────
function cHTMLSupa(c,rank){
  const name=c.legal_name||c.dba_name||'Unknown';
  const city=`${c.phy_city||''}, ${c.phy_state||''}`.trim().replace(/^,\s*/,'');
  const trucks=c.total_power_units>0?c.total_power_units.toLocaleString():'—';
  const drivers=c.total_drivers>0?c.total_drivers.toLocaleString():'—';
  const rk=rank<=3?`r${rank}`:'';
  const dotId=`supa_${c.dot_number}`;
  return`<div class="cc" data-dot="${c.dot_number}"><div class="cc-top"><div class="cc-rnk ${rk}">${rank}</div><div class="cc-nw"><div class="cc-name">${name}</div><div class="cc-hq">${city}</div></div><span class="s-ok">Active</span></div><div class="sgrid"><div class="sg"><div class="sgl">Trucks</div><div class="sgv">${trucks}</div></div><div class="sg"><div class="sgl">Drivers</div><div class="sgv">${drivers}</div></div><div class="sg"><div class="sgl">Safety</div><div class="sgv">${c.safety_rating||'—'}</div></div><div class="sg"><div class="sgl">Hazmat</div><div class="sgv">${c.hazmat_flag==='Y'?'✓':'—'}</div></div></div><div class="cbdg" style="margin-top:8px"><span class="bdg">DOT# ${c.dot_number||'—'}</span>${c.mc_number&&c.mc_number!=='EMPTY'?`<span class="bdg">MC# ${c.mc_number}</span>`:''}<span class="db-badge">FMCSA DB</span></div><div class="cact"><button class="cbtn p" onclick="openRFQSupa('${c.dot_number}')">RFQ 이메일</button><button class="cbtn s" onclick="openDetailSupa('${c.dot_number}')">상세 보기</button></div></div>`;
}

// Supabase 카드용 캐시 (RFQ/상세보기에서 쓰려고)
const supaCache={};
function cacheSupa(carriers){carriers.forEach(c=>{supaCache[c.dot_number]=c});}

async function openRFQSupa(dotNum){
  const c=supaCache[dotNum];
  if(!c){alert('데이터를 찾을 수 없어요');return;}
  const name=c.legal_name||c.dba_name||'Unknown';
  const city=`${c.phy_city||''}, ${c.phy_state||''}`.trim().replace(/^,\s*/,'');
  document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일</div><div class="ms">To: ${name}</div><div style="text-align:center;padding:24px;color:var(--g400);font-size:13px">생성 중...</div>`;
  document.getElementById('ov').classList.add('on');
  try{
    const res=await fetch(`${WORKER}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:`Write a professional freight RFQ email from Hyundai Platform Corporation (HPC), Los Angeles CA to ${name} (DOT# ${c.dot_number}, located in ${city}). Lane: ${ST.origin||'TBD'} to ${ST.dest||'TBD'} | Equipment: ${ST.eq||'Dry Van'}. Format: Subject line first, blank line, email body under 180 words. Keep it professional and concise.`}]})});
    const data=await res.json();const txt=data.content?.[0]?.text||'';
    document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일</div><div class="ms">To: ${name}</div><pre class="rfqpre">${txt}</pre><button class="cpybtn" id="cpyb" onclick="cpyRFQ()">클립보드에 복사</button>`;
    window._rfqTxt=txt;
  }catch(e){document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일</div><div class="ms">${name}</div><div style="padding:20px;color:var(--g400)">생성 실패. 다시 시도해주세요.</div>`;}
}

function openDetailSupa(dotNum){
  const c=supaCache[dotNum];
  if(!c)return;
  const name=c.legal_name||c.dba_name||'Unknown';

}

// ─── MODALS ──────────────────────────────────────────────────────
function openC(id){const c=C.find(x=>x.id===id);if(!c)return;document.getElementById('mc').innerHTML=`<div class="mt">${c.n}</div><div class="ms">Est.${c.yr} · ${c.hq} · ${c.ph}</div><div class="mgrid">${[['MC#',c.mc],['DOT#',c.dot],['Authority',c.auth],['Safety',c.safe],['Fleet',c.fl>0?c.fl.toLocaleString():'Broker'],['Drivers',c.dr>0?c.dr.toLocaleString():'—'],['Avg Pay',c.pay+'d'],['Credit',c.cr+'/100'],['On-Time',c.ot+'%'],['Rate',c.rt]].map(([k,v])=>`<div class="mi"><div class="mik">${k}</div><div class="miv">${v}</div></div>`).join('')}</div><div class="macts"><button class="mbtn p" onclick="openRFQ(${c.id});closeM()">RFQ 이메일</button><a class="mbtn s" href="https://${c.wb}" target="_blank">웹사이트</a></div>`;document.getElementById('ov').classList.add('on');}
async function openRFQ(id){
  const c=C.find(x=>x.id===id);
  document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일</div><div class="ms">To: ${c.n}</div><div style="text-align:center;padding:24px;color:var(--g400);font-size:13px">생성 중...</div>`;
  document.getElementById('ov').classList.add('on');
  try{
    const res=await fetch(`${WORKER}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:`Write a professional freight RFQ email from Hyundai Platform Corporation (HPC), Los Angeles CA to ${c.n}. Lane: ${ST.origin||'TBD'} to ${ST.dest||'TBD'} | Equipment: ${ST.eq||'Dry Van'} | MC#: ${c.mc} | Phone: ${c.ph}. Format: Subject line first, blank line, email body under 180 words.`}]})});
    const data=await res.json();const txt=data.content?.[0]?.text||'';
    document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일</div><div class="ms">To: ${c.n}</div><pre class="rfqpre">${txt}</pre><button class="cpybtn" id="cpyb" onclick="cpyRFQ()">클립보드에 복사</button>`;
    window._rfqTxt=txt;
  }catch(e){document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일</div><div class="ms">${c.n} · ${c.ph}</div>`;}

function cpyRFQ(){if(!window._rfqTxt)return;navigator.clipboard.writeText(window._rfqTxt).then(()=>{const b=document.getElementById('cpyb');if(b){b.textContent='복사됨 ✓';b.className='cpybtn ok';setTimeout(()=>{b.textContent='클립보드에 복사';b.className='cpybtn'},2000);}});}
function closeM(){document.getElementById('ov').classList.remove('on');}

// ─── INPUT ───────────────────────────────────────────────────────
function fillInput(text){const ui=document.getElementById('ui');ui.value=text;autoR(ui);ui.focus();}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function onK(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

// ─── SEND (핵심) ─────────────────────────────────────────────────
async function send(){
  const ui=document.getElementById('ui');
  const val=ui.value.trim();
  if(!val)return;
  ui.value='';ui.style.height='auto';

  // 옵션 선택 중이면 비활성화
  if(ST.optOn){
    const num=parseInt(val);
    if(!isNaN(num)&&num>=1){const btns=document.querySelectorAll('#ow button');if(btns[num-1]){btns[num-1].click();return;}}
    disOpts();
  }

  addUser(val);

  // pending 상태 처리
  if(ST.pending==='__eq__'){ST.pending=null;ST.eq=val;askWeight();return;}
  if(ST.pending==='__weight__'){ST.pending=null;ST.weight=val;runCarrierSearch();return;}

  // ── 모든 입력을 AI 채팅으로 처리 ──
  await doAIChat(val);
}

// ─── 캐리어 검색 (Supabase) ──────────────────────────────────────
async function searchSupabase(originState,limit=15){
  try{
    const headers={'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`};
    if(originState){
      const url=`${SUPA_URL}/rest/v1/carriers?phy_state=eq.${originState}&allowed_to_operate=eq.Y&total_power_units=gte.10&order=total_power_units.desc&limit=${limit}`;
      const res=await fetch(url,{headers});
      if(res.ok){const data=await res.json();if(data.length>=5)return data;}
    }
    const url2=`${SUPA_URL}/rest/v1/carriers?allowed_to_operate=eq.Y&total_power_units=gte.100&order=total_power_units.desc&limit=${limit}`;
    const res2=await fetch(url2,{headers});
    if(res2.ok)return await res2.json();
    return[];
  }catch(e){return[];}
}

async function runCarrierSearch(){
  addThink();await slp(400);rmThink();
  const originState=CITY_STATE[ST.origin]||'';
  addProg(40,'FMCSA DB 검색 중...');
  const supaResults=await searchSupabase(originState,15);
  addProg(90,'결과 정리 중...');
  const localResults=C.filter(c=>{const eqMap={'Dry Van':['Dry Van'],'Refrigerated (Reefer)':['Refrigerated'],'Flatbed':['Flatbed'],'Specialized / Heavy Haul':['Specialized','Heavy Haul'],'Tanker / Bulk':['Tanker','Bulk']};const eqs=ST.eq?(eqMap[ST.eq]||[ST.eq]):[];return !eqs.length||eqs.some(e=>c.eq.includes(e));}).sort((a,b)=>b.rat-a.rat);
  if(ST.origin||ST.dest){const lv=document.createElement('div');lv.className='res';lv.innerHTML=`<div class="lvis"><div class="ldot" style="background:var(--g800)"></div><span style="font-size:12px;font-weight:600;color:var(--g800)">${ST.origin||'?'}</span><div class="lline"><div class="larrow">→</div></div><span style="font-size:12px;font-weight:600;color:var(--g800)">${ST.dest||'?'}</span><div class="ldot" style="background:var(--g400)"></div><span class="ltype">${ST.eq||'OTR'}</span></div>`;ch.appendChild(lv);}
  if(supaResults.length>0){const sW=document.createElement('div');sW.className='res';sW.innerHTML=`<div class="res-hdr">🗄️ FMCSA DB ${supaResults.length}개${originState?' · '+originState+' 지역 우선':''}</div><div class="cards">${supaResults.map((c,i)=>cHTMLSupa(c,i+1)).join('')}</div>`;ch.appendChild(sW);}
  if(localResults.length>0){const cW=document.createElement('div');cW.className='res';cW.innerHTML=`<div class="res-hdr">⭐ 프리미엄 캐리어</div><div class="cards">${localResults.map((c,i)=>cHTML(c,i+1)).join('')}</div>`;ch.appendChild(cW);}
  addProg(100,'완료');scr();
  ST.pending='__chat__';
}

async function askWeight(){
  addAI('화물 무게는요?');
  addOpts([{l:'20,000 lbs 이하'},{l:'20,000 – 35,000 lbs'},{l:'35,000 – 44,000 lbs',s:'Full load'},{l:'건너뛰기'}],(o)=>{if(o.l!=='건너뛰기')ST.weight=o.l;addUser(o.l);runCarrierSearch();});
}
