<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>OTR Finder — HPC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--w:#fff;--g50:#F9FAFB;--g100:#F3F4F6;--g150:#EDEDEE;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;--g900:#111827;--sh0:0 1px 2px rgba(0,0,0,.05);--sh1:0 2px 8px rgba(0,0,0,.08);--sh2:0 8px 32px rgba(0,0,0,.10);}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{background:var(--w);color:var(--g800);font-family:'Inter',sans-serif;font-size:15px}
button{cursor:pointer;font-family:inherit;border:none;background:none}
textarea{font-family:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh;max-width:680px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--g100);background:rgba(255,255,255,.97);backdrop-filter:blur(12px);flex-shrink:0}
.hdr-name{font-weight:700;font-size:14px;color:var(--g900)}
.hdr-r{display:flex;gap:6px}
.hbtn{padding:5px 12px;border-radius:16px;background:var(--g100);color:var(--g600);font-size:12px;font-weight:500;transition:background .15s}
.hbtn:hover{background:var(--g150)}
.chat{flex:1;overflow-y:auto;padding:16px 16px 8px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:64vh;padding:24px 8px;text-align:center}
.wel-title{font-size:22px;font-weight:700;color:var(--g900);letter-spacing:-.4px;margin-bottom:22px}
.qa-col{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px}
.qa{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1px solid var(--g200);background:var(--w);text-align:left;transition:all .14s;box-shadow:var(--sh0)}
.qa:hover{border-color:var(--g300);background:var(--g50)}
.qa-t{font-size:14px;font-weight:600;color:var(--g800)}
.qa-s{font-size:11px;color:var(--g400);margin-top:2px}
.mg{padding:4px 0}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg.user .bub{background:var(--g900);color:#fff;border-radius:18px 4px 18px 18px}
.msg.ai .bub{background:var(--g100);color:var(--g800);border-radius:4px 18px 18px 18px}
.av{width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:4px;background:var(--g800);display:flex;align-items:center;justify-content:center}
.av svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round}
.bub{max-width:86%;padding:10px 14px;font-size:13.5px;line-height:1.62}
.thk-dots{display:inline-flex;gap:4px;align-items:center;padding:12px 14px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g300);animation:bo .85s infinite}
.dot:nth-child(2){animation-delay:.17s}.dot:nth-child(3){animation-delay:.34s}
@keyframes bo{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.opts{padding:4px 0 4px 32px;display:flex;flex-direction:column;gap:5px;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid var(--g200);background:var(--w);font-size:13px;color:var(--g700);text-align:left;transition:all .14s;box-shadow:var(--sh0)}
.opt:hover{border-color:var(--g400);background:var(--g50)}
.opt:disabled{opacity:.35;cursor:not-allowed}
.onum{min-width:20px;height:20px;border-radius:5px;background:var(--g100);color:var(--g500);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.olbl{font-weight:600;font-size:13px;color:var(--g800)}
.osub{font-size:11px;color:var(--g400);margin-top:1px}
.prog{padding:4px 14px 4px 32px;display:flex;align-items:center;gap:8px}
.pbar{flex:1;height:2px;background:var(--g100);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--g800);border-radius:2px;transition:width .4s}
.ptxt{font-size:10px;color:var(--g400);font-weight:500;white-space:nowrap}
.res{padding:4px 0 4px 32px;animation:fu .25s ease}
.res-hdr{font-size:11px;font-weight:600;color:var(--g400);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.aib{background:var(--g50);border:1px solid var(--g200);border-radius:11px;padding:13px 15px;margin-bottom:8px;font-size:13px;line-height:1.8;color:var(--g700);white-space:pre-wrap}
.aib-hdr{font-size:10px;font-weight:600;color:var(--g500);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.ratebox{background:var(--g50);border:1px solid var(--g200);border-radius:11px;padding:14px 16px;margin-bottom:8px}
.ratebox-hdr{font-size:10px;font-weight:600;color:var(--g500);letter-spacing:.06em;text-transform:uppercase;margin-bottom:11px}
.rate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.rg{background:var(--w);border:1px solid var(--g200);border-radius:9px;padding:10px 8px;text-align:center}
.rg-l{font-size:9px;color:var(--g400);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.rg-v{font-size:16px;font-weight:700;color:var(--g900);letter-spacing:-.3px}
.rg-s{font-size:10px;color:var(--g400);margin-top:2px}
.rate-range{margin-bottom:11px}
.rr-lbl{font-size:11px;font-weight:600;color:var(--g600);margin-bottom:6px}
.rr-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.rr-tag{font-size:10px;color:var(--g400);width:36px;flex-shrink:0;font-weight:500}
.rr-bar{flex:1;height:5px;background:var(--g200);border-radius:5px;overflow:hidden}
.rr-fill{height:100%;background:var(--g400);border-radius:5px}
.rr-fill.mid{background:var(--g700)}
.rr-val{font-size:11px;font-weight:600;color:var(--g700);width:58px;text-align:right;flex-shrink:0}
.mkt-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mkt-lbl{font-size:11px;color:var(--g500)}
.mkt-badge{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;background:var(--g200);color:var(--g700)}
.mkt-fsc{font-size:11px;color:var(--g400);margin-left:auto}
.rate-tips{font-size:12px;color:var(--g600);line-height:1.75;margin-bottom:8px}
.rate-note{font-size:10px;color:var(--g300);margin-top:10px;padding-top:9px;border-top:1px solid var(--g200)}
.lvis{display:flex;align-items:center;gap:8px;background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:9px 13px;margin-bottom:8px}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lline{flex:1;height:1px;background:var(--g300);position:relative}
.larrow{position:absolute;top:-7px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--g400);font-weight:500}
.ltype{font-size:10px;color:var(--g400);margin-left:auto}
.cards{display:flex;flex-direction:column;gap:7px}
.cc{background:var(--w);border:1px solid var(--g200);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .16s;box-shadow:var(--sh0)}
.cc:hover{border-color:var(--g400);box-shadow:var(--sh1)}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.cc-rnk{width:19px;height:19px;border-radius:5px;background:var(--g100);color:var(--g500);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:monospace}
.cc-rnk.r1{background:var(--g900);color:#fff}.cc-rnk.r2{background:var(--g600);color:#fff}.cc-rnk.r3{background:var(--g400);color:#fff}
.cc-nw{flex:1;min-width:0}
.cc-name{font-size:13px;font-weight:700;color:var(--g900)}
.cc-hq{font-size:10px;color:var(--g400);margin-top:1px}
.cc-sv{width:26px;height:26px;border-radius:7px;background:var(--g100);color:var(--g500);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}
.cc-sv.on{background:var(--g900);color:#fff}
.cc-row{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.star{font-size:10px;color:var(--g300)}.star.on{color:var(--g800)}
.sn{font-size:10px;color:var(--g400)}
.s-ok{background:var(--g100);color:var(--g600);font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600}
.s-bk{background:var(--g100);color:var(--g500);font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600}
.rt{font-size:10px;color:var(--g400);margin-left:auto}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:7px}
.sg{background:var(--g50);border-radius:6px;padding:5px 6px;text-align:center}
.sgl{font-size:8px;color:var(--g400);margin-bottom:1px;text-transform:uppercase;letter-spacing:.03em}
.sgv{font-size:10px;font-weight:700;color:var(--g700)}
.ctags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.tg{font-size:9px;padding:1px 7px;border-radius:20px;background:var(--g100);color:var(--g600);font-weight:500}
.cbdg{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.bdg{font-size:9px;padding:1px 6px;border-radius:4px;background:var(--g100);color:var(--g500);font-weight:500}
.db-badge{font-size:9px;padding:1px 6px;border-radius:4px;background:#dbeafe;color:#1d4ed8;font-weight:600}
.cmc{font-size:8px;color:var(--g300);margin-left:auto;font-family:monospace}
.cact{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid var(--g100)}
.cbtn{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:600;transition:all .14s}
.cbtn.p{background:var(--g900);color:#fff}.cbtn.p:hover{background:var(--g800)}
.cbtn.s{background:var(--g100);color:var(--g700)}.cbtn.s:hover{background:var(--g150)}
.inp-area{padding:10px 16px 20px;border-top:1px solid var(--g100);background:rgba(255,255,255,.97);backdrop-filter:blur(12px);flex-shrink:0}
.ac-wrap{position:relative}
.acdrop{position:absolute;bottom:calc(100% + 5px);left:0;right:0;z-index:100;background:var(--w);border:1px solid var(--g200);border-radius:12px;box-shadow:var(--sh2);overflow:hidden;display:none}
.aci{padding:9px 14px;font-size:13px;color:var(--g700);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .1s}
.aci:hover,.aci.hl{background:var(--g50)}
.aci mark{background:transparent;color:var(--g900);font-weight:700;padding:0}
.hub-c{font-size:9px;background:var(--g100);color:var(--g500);padding:1px 5px;border-radius:4px;margin-left:auto;font-weight:600}
.ibox{display:flex;align-items:flex-end;gap:6px;background:var(--g100);border-radius:22px;padding:5px 5px 5px 14px;transition:box-shadow .2s,background .2s}
.ibox:focus-within{background:var(--w);box-shadow:0 0 0 1.5px var(--g800),var(--sh1)}
.ibox textarea{flex:1;background:transparent;border:none;outline:none;color:var(--g900);font-size:14px;resize:none;line-height:1.5;padding:4px 0;min-height:24px;max-height:96px}
.ibox textarea::placeholder{color:var(--g400)}
.sbtn{width:32px;height:32px;border-radius:13px;flex-shrink:0;background:var(--g900);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .14s}
.sbtn:hover{background:var(--g800)}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--w);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;padding:16px 18px 28px;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:30px;height:4px;border-radius:4px;background:var(--g200);margin:0 auto 14px}
.mt{font-size:17px;font-weight:700;color:var(--g900);margin-bottom:3px}
.ms{font-size:12px;color:var(--g400);margin-bottom:13px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.mi{background:var(--g50);border-radius:8px;padding:9px 11px}
.mik{font-size:9px;color:var(--g400);font-weight:500;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.miv{font-size:12px;color:var(--g800);font-weight:600}
.macts{display:flex;gap:6px;margin-top:12px}
.mbtn{flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:600;transition:all .14s;text-align:center;display:flex;align-items:center;justify-content:center}
.mbtn.p{background:var(--g900);color:#fff}.mbtn.p:hover{background:var(--g800)}
.mbtn.s{background:var(--g100);color:var(--g700)}.mbtn.s:hover{background:var(--g150)}
.rfqpre{background:var(--g50);border:1px solid var(--g200);border-radius:9px;padding:13px;font-size:11.5px;color:var(--g700);white-space:pre-wrap;max-height:280px;overflow-y:auto;line-height:1.7;font-family:'Courier New',monospace}
.cpybtn{width:100%;margin-top:8px;padding:11px;border-radius:10px;font-size:13px;font-weight:600;background:var(--g900);color:#fff;transition:all .14s}
.cpybtn:hover{background:var(--g800)}.cpybtn.ok{background:var(--g600)}
@media(max-width:480px){.sgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

function resolveCity(raw){
  if(!raw) return '';
  const t = raw.trim();
  // 1) 정확히 매핑되는 경우 (대소문자 무시)
  const upper = t.toUpperCase();
  for(const [alias, city] of Object.entries(CITY_ALIAS)){
    if(alias.toUpperCase() === upper) return city;
  }
  // 2) 포함 매핑 (긴 것 먼저)
  const sorted = Object.entries(CITY_ALIAS).sort((a,b)=>b[0].length-a[0].length);
  for(const [alias, city] of sorted){
    if(t.toLowerCase().includes(alias.toLowerCase())) return city;
  }
  // 3) CITIES_EN 직접 매칭
  const lower = t.toLowerCase();
  for(const city of CITIES_EN){
    const name = city.split(',')[0].toLowerCase();
    if(lower.includes(name)) return city;
  }
  return '';
}

// ─── CARRIER SEARCH (로컬 + Supabase) ────────────────────────────
async function runCarrierSearch(){
  addThink();await slp(500);rmThink();
  // 로컬 필터
  const eqMap={'Dry Van':['Dry Van'],'Refrigerated (Reefer)':['Refrigerated'],'Flatbed':['Flatbed'],'Specialized / Heavy Haul':['Specialized','Heavy Haul'],'Tanker / Bulk':['Tanker','Bulk']};
  const eqs=ST.eq?(eqMap[ST.eq]||[ST.eq]):[];
  const localResults=C.filter(c=>{const eq=!eqs.length||eqs.some(e=>c.eq.includes(e));const haz=!ST.notes.includes('Hazmat')||c.haz;return eq&&haz;}).sort((a,b)=>b.rat-a.rat);
  // Supabase 검색
  const originState=CITY_STATE[ST.origin]||'';
  addProg(30,'FMCSA DB 검색 중...');
  const supaResults=await searchSupabase(originState,20);
  addProg(80,'결과 정리 중...');
  // Lane 시각화
  if(ST.origin||ST.dest){const lv=document.createElement('div');lv.className='res';lv.innerHTML=`<div class="lvis"><div class="ldot" style="background:var(--g800)"></div><span style="font-size:12px;font-weight:600;color:var(--g800)">${ST.origin||'Origin'}</span><div class="lline"><div class="larrow">→</div></div><span style="font-size:12px;font-weight:600;color:var(--g800)">${ST.dest||'Destination'}</span><div class="ldot" style="background:var(--g400)"></div><span class="ltype">${ST.eq||'OTR'}</span></div>`;ch.appendChild(lv);}
  // 결과 요약
  const aiW=document.createElement('div');aiW.className='res';
  aiW.innerHTML=`<div class="aib"><div class="aib-hdr">매칭 결과</div>${ST.origin||'?'} → ${ST.dest||'?'} 레인에서 총 <b>${localResults.length+supaResults.length}개</b> 캐리어를 찾았습니다.\n\n⭐ 프리미엄 DB: ${localResults.length}개\n🗄️ FMCSA DB${originState?' ('+originState+' 지역 우선)':''}: ${supaResults.length}개</div>`;
  ch.appendChild(aiW);
  // 로컬 카드
  if(localResults.length>0){const cW=document.createElement('div');cW.className='res';cW.innerHTML=`<div class="res-hdr">⭐ 프리미엄 캐리어 ${localResults.length}개</div><div class="cards">${localResults.map((c,i)=>cHTML(c,i+1)).join('')}</div>`;ch.appendChild(cW);}
  // Supabase 카드
  if(supaResults.length>0){const sW=document.createElement('div');sW.className='res';sW.innerHTML=`<div class="res-hdr">🗄️ FMCSA DB ${supaResults.length}개${originState?' · '+originState+' 지역':''}</div><div class="cards">${supaResults.map((c,i)=>cHTMLSupa(c,i+1)).join('')}</div>`;ch.appendChild(sW);}
  addProg(100,'완료');
  setTimeout(()=>{addOpts([{l:'이 레인 운임 조회'},{l:'다시 검색'},{l:'처음으로'}],(o)=>{if(o.l.includes('운임'))startRateWithLane();else if(o.l.includes('다시'))startCarrier();else showWelcome();});},400);
  scr();
}

// Supabase 캐리어 카드

// ─── MC LOOKUP ───────────────────────────────────────────────────
function startMC(){ch.innerHTML='';addUser('MC # 조회');setTimeout(async()=>{addThink();await slp(350);rmThink();addAI('MC 번호, DOT 번호, 또는 캐리어 이름을 입력해주세요.');ST.pending='__mc__';document.getElementById('ui').placeholder='예: MC-042958 또는 J.B. Hunt...';document.getElementById('ui').focus();},300);}
async function doMC(q){
  const local=C.find(c=>c.mc.toLowerCase().includes(q.toLowerCase())||c.dot.toLowerCase().includes(q.toLowerCase())||c.n.toLowerCase().includes(q.toLowerCase()));
  if(local){const w=document.createElement('div');w.className='res';w.innerHTML=`<div class="res-hdr">검색 결과 (로컬 DB)</div><div class="cards">${cHTML(local,1)}</div>`;ch.appendChild(w);scr();setTimeout(()=>{addOpts([{l:'캐리어 찾기'},{l:'다른 MC 조회'},{l:'처음으로'}],(o)=>{if(o.l.includes('캐리어'))startCarrier();else if(o.l.includes('MC'))startMC();else showWelcome();});},400);return;}
  addThink();
  const WORKER='https://otr-finder-api.wayneslee1018.workers.dev';
  const clean=q.replace(/mc-?/i,'').trim();
  let apiUrl='';
  if(q.match(/^mc-?\d+$/i))apiUrl=`${WORKER}/mc/${clean}`;
  else if(q.match(/^\d{6,}$/))apiUrl=`${WORKER}/dot/${clean}`;
  else apiUrl=`${WORKER}/name/${encodeURIComponent(q)}`;
  try{
    const res=await fetch(apiUrl);const data=await res.json();rmThink();
    const carriers=(data.content||[]).map(item=>item.carrier||item).filter(Boolean);
    if(!carriers.length){addAI(`"${q}" — FMCSA에서도 찾지 못했습니다.\n공식 조회: <a href="https://safer.fmcsa.dot.gov" target="_blank" style="color:var(--g800);text-decoration:underline">safer.fmcsa.dot.gov</a>`);ST.pending='__mc__';return;}
    const w=document.createElement('div');w.className='res';
    w.innerHTML=`<div class="res-hdr">FMCSA 검색 결과 ${carriers.length}개</div><div class="cards">${carriers.slice(0,5).map((c,i)=>{const name=c.legalName||c.dbaName||'Unknown';const auth=c.allowedToOperate==='Y'?'Active':'Inactive';const city=`${c.phyCity||''}, ${c.phyState||''}`.trim().replace(/^,\s*/,'');return`<div class="cc"><div class="cc-top"><div class="cc-rnk ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div><div class="cc-nw"><div class="cc-name">${name}</div><div class="cc-hq">${city}</div></div><span class="${auth==='Active'?'s-ok':'s-bk'}">${auth}</span></div><div class="sgrid" style="margin-top:8px"><div class="sg"><div class="sgl">Trucks</div><div class="sgv">${c.totalPowerUnits||'—'}</div></div><div class="sg"><div class="sgl">Drivers</div><div class="sgv">${c.totalDrivers||'—'}</div></div><div class="sg"><div class="sgl">Safety</div><div class="sgv">${c.safetyRating||'—'}</div></div><div class="sg"><div class="sgl">OOS</div><div class="sgv">${c.oosRate||'—'}</div></div></div><div class="cbdg" style="margin-top:6px"><span class="bdg">DOT# ${c.dotNumber||'—'}</span><span class="bdg">MC# ${c.mcNumber||'—'}</span>${c.hazmatFlag==='Y'?'<span class="bdg">Hazmat</span>':''}</div></div>`;}).join('')}</div>`;
    ch.appendChild(w);scr();
  }catch(e){rmThink();addAI('조회 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');ST.pending='__mc__';}
  setTimeout(()=>{addOpts([{l:'다른 MC 조회'},{l:'캐리어 찾기'},{l:'처음으로'}],(o)=>{if(o.l.includes('MC'))startMC();else if(o.l.includes('캐리어'))startCarrier();else showWelcome();});},400);
}

function refreshSvBtns(){document.querySelectorAll('.cc').forEach(card=>{const m=card.getAttribute('onclick')||'';const mm=m.match(/openC\((\d+)\)/);if(mm){const c=C.find(x=>x.id===parseInt(mm[1]));if(c){const b=card.querySelector('.cc-sv');if(b)b.className='cc-sv'+(isS(c)?' on':'')}}});}

// ─── MODALS ──────────────────────────────────────────────────────
function openC(id){const c=C.find(x=>x.id===id);if(!c)return;document.getElementById('mc').innerHTML=`<div class="mt">${c.n}</div><div class="ms">Est.${c.yr} · ${c.hq} · ${c.ph}</div><div class="mgrid">${[['MC#',c.mc],['DOT#',c.dot],['Authority',c.auth],['Safety',c.safe],['Fleet',c.fl>0?c.fl.toLocaleString():'Asset-light'],['Drivers',c.dr>0?c.dr.toLocaleString():'Independent'],['Avg Pay Days',c.pay+'d'],['Credit Score',c.cr+'/100'],['On-Time',c.ot+'%'],['Rate Index',c.rt]].map(([k,v])=>`<div class="mi"><div class="mik">${k}</div><div class="miv">${v}</div></div>`).join('')}</div><div class="ctags">${c.spec.map(s=>`<span class="tg">${s}</span>`).join('')}</div><div class="macts"><button class="mbtn p" onclick="openRFQ(${c.id});closeM()">RFQ 이메일 생성</button><a class="mbtn s" href="https://${c.wb}" target="_blank">웹사이트</a></div>`;document.getElementById('ov').classList.add('on');}
async function openRFQ(id){const c=C.find(x=>x.id===id);document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일 생성</div><div class="ms">To: ${c.n}</div><div style="text-align:center;padding:24px;color:var(--g400);font-size:13px">생성 중...</div>`;document.getElementById('ov').classList.add('on');try{const txt=await aiCall(`Write a professional freight RFQ email from Hyundai Platform Corporation (HPC), Los Angeles CA to ${c.n}. Lane: ${ST.origin||'TBD'} to ${ST.dest||'TBD'} | Equipment: ${ST.eq||'Dry Van'} | Weight: ${ST.weight||'TBD'} | MC#: ${c.mc} | Phone: ${c.ph}. Format: Subject line first, blank line, email body under 180 words.`,500);document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일</div><div class="ms">To: ${c.n}</div><pre class="rfqpre">${txt}</pre><button class="cpybtn" id="cpyb" onclick="cpyRFQ()">클립보드에 복사</button>`;window._rfqTxt=txt;}catch(e){document.getElementById('mc').innerHTML=`<div class="mt">RFQ 이메일 생성</div><div class="ms" style="color:var(--g500)">Claude.ai 환경에서만 사용 가능합니다.<br/><b>${c.n}</b><br/>${c.ph}</div>`;}}
function cpyRFQ(){if(!window._rfqTxt)return;navigator.clipboard.writeText(window._rfqTxt).then(()=>{const b=document.getElementById('cpyb');if(b){b.textContent='복사됨';b.className='cpybtn ok';setTimeout(()=>{b.textContent='클립보드에 복사';b.className='cpybtn'},2000)}});}
function closeM(){document.getElementById('ov').classList.remove('on')}
function showSaved(){const mc=document.getElementById('mc');mc.innerHTML=ST.saved.length?`<div class="mt">저장된 캐리어</div><div class="ms">${ST.saved.length}개</div><div class="cards">${ST.saved.map((c,i)=>cHTML(c,i+1)).join('')}</div>`:`<div class="mt">저장된 캐리어</div><div class="ms">아직 저장된 캐리어가 없습니다.</div>`;document.getElementById('ov').classList.add('on');}

// ─── AUTOCOMPLETE ────────────────────────────────────────────────
let acSg=[],acHL=0;
function doAC(q){const drop=document.getElementById('acdrop');if(!q||q.length<2){drop.style.display='none';return}const lower=q.toLowerCase();const a=CITIES_EN.filter(c=>c.toLowerCase().startsWith(lower)).slice(0,5);const b=CITIES_EN.filter(c=>!c.toLowerCase().startsWith(lower)&&c.toLowerCase().includes(lower)).slice(0,3);acSg=[...a,...b].slice(0,7);acHL=0;if(!acSg.length){drop.style.display='none';return}drop.style.display='block';drop.innerHTML=acSg.map((city,i)=>{const isH=city.includes('Port of')||city.includes('Hub')||city.includes('Border');const idx=city.toLowerCase().indexOf(lower);const hi=idx>=0?city.slice(0,idx)+`<mark>${city.slice(idx,idx+q.length)}</mark>`+city.slice(idx+q.length):city;return`<div class="aci${i===acHL?' hl':''}" onmousedown="event.preventDefault();selAC('${city.replace(/'/g,"\\'")}')"> ${hi}${isH?'<span class="hub-c">HUB</span>':''}</div>`;}).join('');}
function selAC(city){const ui=document.getElementById('ui');ui.value=city;autoR(ui);document.getElementById('acdrop').style.display='none'}
function closeAC(){document.getElementById('acdrop').style.display='none'}

// ─── INPUT ───────────────────────────────────────────────────────
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,96)+'px'}
function onK(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();return}const q=e.target.value+(e.key.length===1?e.key:'');if(ST.pending==='__lane__'||ST.pending==='__rate_lane__')doAC(q);else closeAC();}
function send(){
  const ui=document.getElementById('ui');const val=ui.value.trim();if(!val)return;
  ui.value='';ui.style.height='auto';closeAC();
  const num=parseInt(val);if(!isNaN(num)&&num>=1&&ST.optOn){const btns=document.querySelectorAll('#ow button');if(btns[num-1]){btns[num-1].click();return}}

  // 옵션 선택 중이더라도 새 레인 입력이면 흐름 재시작
  if(ST.optOn){
    // AI로 도시 감지해서 새 레인이면 재시작
    parseLaneWithAI(val).then(({origin,dest})=>{
      if(origin&&dest){
        // 새 레인 감지 → 캐리어 찾기 재시작
        disOpts();
        ST.origin=origin;ST.dest=dest;
        ch.innerHTML='';
        addUser(val);
        addAI(`${origin} → ${dest} 확인했습니다.\n\n어떤 장비(Equipment)가 필요하신가요?`);
        addOpts([{l:'Dry Van',s:'일반 건화물'},{l:'Refrigerated (Reefer)',s:'냉동 · 냉장'},{l:'Flatbed',s:'플랫베드 · 중장비'},{l:'Specialized / Heavy Haul',s:'특수 · 대형'},{l:'Tanker / Bulk',s:'탱커 · 벌크'}],(o)=>{ST.eq=o.l;addUser(o.l);askWeight();});
      } else {
        // 도시 아니면 원래 옵션 선택으로
        addUser(val);
      }
    });
    return;
  }

  if(ST.pending){const p=ST.pending;ST.pending=null;addUser(val);if(p==='__lane__')handleLaneInput(val);else if(p==='__rate_lane__')handleRateLane(val);else if(p==='__mc__')doMC(val);else if(p==='__chat__')doChat(val);return;}
  addUser(val);const l=val.toLowerCase();
  if(l.includes('운임')||l.includes('rate')||l.includes('얼마')||l.includes('비용'))startRate();
  else if(l.includes('찾')||l.includes('캐리어')||l.includes('carrier'))startCarrier();
  else if(l.includes('mc-')||l.match(/\d{6,}/))doMC(val);
  else{const{origin,dest}=parseLaneText(val);if(origin||dest){ST.origin=origin;ST.dest=dest;ch.innerHTML='';addUser(val);handleLaneInput(val)}else{setTimeout(async()=>{addThink();await slp(350);rmThink();addAI('무엇을 도와드릴까요?');addOpts([{l:'캐리어 찾기'},{l:'운임 조회'},{l:'MC # 조회'},{l:'처음으로'}],(o)=>{if(o.l.includes('캐리어'))startCarrier();else if(o.l.includes('운임'))startRate();else if(o.l.includes('MC'))startMC();else showWelcome()})},0);}}
}
function goHome(){showWelcome()}

// ─── AI 채팅 ─────────────────────────────────────────────────────
let chatHistory = [];
function startChat(){
  chatHistory = [];
  ch.innerHTML='';
  addUser('AI 물류 상담');
  setTimeout(async()=>{
    addThink();await slp(400);rmThink();
    addAI('안녕하세요! OTR Finder AI입니다. 🚛\n\n미국 화물 운송에 관한 무엇이든 물어보세요!\n\n예시:\n• "LA에서 Chicago 가는 Dry Van 시장 운임이 어때?"\n• "Werner Enterprises 어떤 회사야?"\n• "Hazmat 화물 운송할 때 주의사항은?"\n• "지금 freight 시장 상황 어때?"');
    ST.pending='__chat__';
    document.getElementById('ui').placeholder='화물 운송에 관해 무엇이든 질문하세요...';
    document.getElementById('ui').focus();
  },300);
}

async function doChat(userMsg){
  chatHistory.push({role:'user', content: userMsg});
  addThink();
  try{
    const res = await fetch('https://otr-finder-api.wayneslee1018.workers.dev/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages: chatHistory})
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '죄송해요, 잠시 후 다시 시도해주세요.';
    rmThink();
    chatHistory.push({role:'assistant', content: reply});
    addAI(reply);
  }catch(e){
    rmThink();
    addAI('연결 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
  ST.pending='__chat__';
}
window.startCarrier=startCarrier;window.startRate=startRate;window.startMC=startMC;window.startChat=startChat;
window.openC=openC;window.openRFQ=openRFQ;window.cpyRFQ=cpyRFQ;window.closeM=closeM;
window.showSaved=showSaved;window.goHome=goHome;window.selAC=selAC;window.togSv=togSv;
document.getElementById('sc').textContent=ST.saved.length;
showWelcome();
</script>
